apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluentd
  namespace: kube-logging
  labels:
    app: fluentd
spec:
  selector:
    matchLabels:
      app: fluentd
  template:
    metadata:
      labels:
        app: fluentd
    spec:
      serviceAccount: fluentd
      serviceAccountName: fluentd
      containers:
      - name: fluentd
        image: fluent/fluentd-kubernetes-daemonset:v1.4.2-debian-elasticsearch-1.1
        env:
        - name: FLUENT_ELASTICSEARCH_HOST
          valueFrom:
            configMapKeyRef:
              name: fluentd-cm
              key: fluentd-host
        - name: FLUENT_ELASTICSEARCH_PORT
          valueFrom:
            configMapKeyRef:
              name: fluentd-cm
              key: fluentd-port
        - name: FLUENT_ELASTICSEARCH_SCHEME
          valueFrom:
            configMapKeyRef:
              name: fluentd-cm
              key: fluentd-es-scheme
        - name: FLUENTD_SYSTEMD_CONF
          valueFrom:
            configMapKeyRef:
              name: fluentd-cm
              key: fluentd-systemd-config
        resources:
          limits:
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 200Mi  
        volumeMounts:
          - name: varlog
            mountPath: /var/log
          - name: varlibdockercontainer
            mountPath: /var/lib/docker/containers
            readOnly: true
      terminationGracePeriodSeconds: 30
      volumes:
      - name: varlog
        hostPath:
          path: /var/log
      - name: varlibdockercontainers
        hostPath:
           path: /var/lib/docker/containers

        
        
        

          
