apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata: 
      labels:
        app: mongo
    spec:
      containers:
      - name: mongodb
        image: iemafzal/mongodb:v1
        ports:
        - containerPort: 27017
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          value: root
        - name: MONGO_INITDB_ROOT_PASSWORD
          value: admin
        volumeMounts:
        - name: mongo-db
          mountPath: /data/db
      volumes:  
      - name: mongo-db
        persistentVolumeClaim:
          claimName: mongo-pvc
